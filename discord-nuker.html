<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCORD NUKER - VR7 - AKO</title>
    <meta name="description" content="أداة احترافية للتحكم في سيرفرات ديسكورد">
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-b from-slate-900 via-slate-900 to-slate-950 text-foreground flex flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-gradient-to-b from-slate-900/95 to-slate-900/80 backdrop-blur-md border-b border-slate-700/50 py-4 px-4">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-2.5">
                    <div class="p-2 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-lg">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">DISCORD NUKER</h1>
                        <p class="text-xs text-slate-400">v1.0.0</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs font-semibold text-slate-300">VR7 - AKO</p>
                </div>
            </div>
        </header>

        <!-- Disclaimer Alert -->
        <div class="bg-gradient-to-r from-red-900/30 to-orange-900/30 border-b border-red-700/50 px-4 py-3">
            <div class="flex gap-2.5 items-start">
                <svg class="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
                </svg>
                <div>
                    <h3 class="font-bold text-red-300 text-xs mb-0.5">⚠️ تنبيه مهم</h3>
                    <p class="text-xs text-red-200/80 leading-relaxed">
                        استخدم هذه الأداة على سيرفراتك فقط. الاستخدام غير المصرح قد يؤدي لعواقب قانونية.
                    </p>
                </div>
            </div>
        </div>

        <main class="flex-1 px-4 py-4 pb-6 space-y-3">
            <!-- Credentials Section -->
            <div class="space-y-2">
                <button onclick="toggleSection('credentials')" class="w-full flex items-center justify-between p-3.5 bg-gradient-to-r from-slate-800 to-slate-800/50 hover:from-slate-700 hover:to-slate-700/50 border border-slate-700/50 rounded-xl transition-all duration-200">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                        </svg>
                        <span class="font-semibold text-sm">بيانات الاتصال</span>
                    </div>
                    <svg id="chevron-credentials" class="w-4 h-4 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                    </svg>
                </button>

                <div id="credentials-content" class="hidden space-y-3 p-3.5 bg-slate-800/50 border border-slate-700/50 rounded-xl">
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 mb-2">Bot Token</label>
                        <input type="password" id="botToken" placeholder="أدخل Bot Token الخاص بك" class="w-full bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 text-sm h-10 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 mb-2">Guild ID</label>
                        <input type="text" id="guildId" placeholder="أدخل معرف السيرفر" class="w-full bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 text-sm h-10 rounded-lg px-3 py-2">
                    </div>
                    <button onclick="validateCredentials()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold h-10 rounded-lg transition-all duration-200 text-sm">
                        التحقق من البيانات
                    </button>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="space-y-2">
                <button onclick="toggleSection('actions')" class="w-full flex items-center justify-between p-3.5 bg-gradient-to-r from-slate-800 to-slate-800/50 hover:from-slate-700 hover:to-slate-700/50 border border-slate-700/50 rounded-xl transition-all duration-200">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <span class="font-semibold text-sm">الإجراءات</span>
                    </div>
                    <svg id="chevron-actions" class="w-4 h-4 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                    </svg>
                </button>

                <div id="actions-content" class="hidden space-y-2.5 p-3.5 bg-slate-800/50 border border-slate-700/50 rounded-xl">
                    <button onclick="executeAction('ban')" class="w-full justify-center gap-2 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-semibold h-11 rounded-lg transition-all duration-200 text-sm flex items-center">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        حظر جميع الأعضاء
                    </button>

                    <button onclick="executeAction('delete')" class="w-full justify-center gap-2 bg-gradient-to-r from-orange-600 to-orange-700 hover:from-orange-500 hover:to-orange-600 text-white font-semibold h-11 rounded-lg transition-all duration-200 text-sm flex items-center">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-9l-1 1H5v2h14V4z"/>
                        </svg>
                        حذف جميع الرومات
                    </button>

                    <div class="space-y-2.5 pt-2.5 border-t border-slate-700/50">
                        <div>
                            <label class="block text-xs font-semibold text-slate-300 mb-2">اسم الروم</label>
                            <input type="text" id="channelName" placeholder="مثال: spam" class="w-full bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 text-sm h-10 rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-300 mb-2">عدد الرومات</label>
                            <input type="number" id="channelCount" min="1" max="100" placeholder="1" value="1" class="w-full bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 text-sm h-10 rounded-lg px-3 py-2">
                        </div>
                        <button onclick="executeAction('create')" class="w-full justify-center gap-2 bg-gradient-to-r from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 text-white font-semibold h-11 rounded-lg transition-all duration-200 text-sm flex items-center">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                            </svg>
                            إنشاء رومات
                        </button>
                    </div>
                </div>
            </div>

            <!-- Logs Section -->
            <div class="space-y-2">
                <button onclick="toggleSection('logs')" class="w-full flex items-center justify-between p-3.5 bg-gradient-to-r from-slate-800 to-slate-800/50 hover:from-slate-700 hover:to-slate-700/50 border border-slate-700/50 rounded-xl transition-all duration-200">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-5 h-5 text-cyan-400" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        <span class="font-semibold text-sm">سجل العمليات</span>
                    </div>
                    <svg id="chevron-logs" class="w-4 h-4 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                    </svg>
                </button>

                <div id="logs-content" class="hidden p-3.5 bg-slate-900/80 border border-slate-700/50 rounded-xl">
                    <div id="logs-container" class="bg-black/50 rounded-lg p-3 min-h-48 max-h-96 overflow-y-auto font-mono text-xs space-y-1 border border-slate-700/30">
                        <div class="text-slate-500 text-center py-12">
                            <p>لا توجد عمليات حتى الآن</p>
                            <p class="text-xs mt-1">ابدأ بتنفيذ إجراء</p>
                        </div>
                    </div>
                    <button onclick="clearLogs()" class="mt-2 text-xs text-slate-400 hover:text-slate-300 transition-colors">
                        مسح السجل
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="border-t border-slate-700/50 bg-gradient-to-t from-slate-950 to-slate-900/50 px-4 py-4 text-center">
            <p class="text-xs text-slate-400 mb-2">© 2024 جميع الحقوق محفوظة</p>
            <p class="text-sm font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                VR7 - AKO
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
